<div class="service-card" dir="rtl" (click)="viewDetails()">
  <!-- Category Badge -->
  <div class="card-badge" [style.background]="getCategoryColor() + '18'" [style.color]="getCategoryColor()">
    {{ service.categoryName }}
  </div>

  <!-- Content -->
  <div class="card-body">
    <h3 class="card-title">{{ service.srvName }}</h3>
    <p class="card-desc">{{ service.srvDesc }}</p>
  </div>

  <!-- Meta -->
  <div class="card-meta">
    <span class="meta-item">
      <i class="bi bi-clock"></i>
      {{ service.srvTime }}
    </span>
    <span class="meta-item">
      <i class="bi bi-cash"></i>
      {{ service.estimatedFees }} ج.م
    </span>
  </div>

  <!-- Action -->
  <button class="view-btn" (click)="$event.stopPropagation(); viewDetails()">
    <span>عرض التفاصيل</span>
    <i class="bi bi-arrow-left"></i>
  </button>
</div>
