<section class="egypt-digital bg-section">
  <div class="container py-5">
    <div class="row align-items-center g-5">
      <!-- النصوص على اليمين -->
      <div class="col-lg-6 order-lg-1 order-2">
        <div class="egypt-digital__content">
          <h2 class="egypt-digital__title">
            قرّبنا إليك كل ما تحتاج إليه، استخدم مصر الرقمية من جهازك الذكي أو محمولك وادفع بالطريقة التي تناسبك
          </h2>
          <p class="egypt-digital__desc">
            بوابة مصر الإلكترونية تقدم لك كل الخدمات الحكومية بطريقة فورية وسهلة وأنت في مكانك! تابعنا، لمعرفة المزيد عن الخدمات الحكومية التي ستُضاف للموقع يمكنك تنزيل تطبيق الخدمات الرقمية
          </p>
          <button [routerLink]="['/services']" class="egypt-digital__btn">
            <span>تصفح الخدمات</span>
          </button>
        </div>
      </div>

      <!-- الصورة على اليسار -->
      <div class="col-lg-6 order-lg-2 order-1 text-center position-relative">
        <div class="egypt-digital__image-wrapper">
          <img src="/Images/egypt_digital_light.png" class="egypt-digital__img egypt-digital__img--light img-fluid" alt="مصر الرقمية" />
          <img src="/Images/egypt_digital_dark.png" class="egypt-digital__img egypt-digital__img--dark img-fluid" alt="مصر الرقمية" />
        </div>
      </div>
    </div>
  </div>
</section>
