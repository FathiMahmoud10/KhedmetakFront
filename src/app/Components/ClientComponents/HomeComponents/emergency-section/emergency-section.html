<section class="emergency-numbers">
  <div class="container py-5">
    <div class="emergency-numbers__header text-center mb-5">
      <h2 class="emergency-numbers__title">أرقام الطوارئ</h2>
    </div>

    <div class="row g-4 justify-content-center">
      <!-- النجدة -->
      <div class="col-md-4 col-sm-6">
        <a href="tel:122" class="emergency-card">
          <div class="emergency-card__number">122</div>
          <div class="emergency-card__footer">
            <div class="emergency-card__icon emergency-card__icon--police">
              <i class="bi bi-shield-fill"></i>
            </div>
            <span class="emergency-card__label">النجدة</span>
          </div>
        </a>
      </div>

      <!-- الإسعاف -->
      <div class="col-md-4 col-sm-6">
        <a href="tel:123" class="emergency-card">
          <div class="emergency-card__number">123</div>
          <div class="emergency-card__footer">
            <div class="emergency-card__icon emergency-card__icon--ambulance">
              <i class="bi bi-heart-pulse-fill"></i>
            </div>
            <span class="emergency-card__label">الإسعاف</span>
          </div>
        </a>
      </div>

      <!-- استعلامات الكهرباء -->
      <div class="col-md-4 col-sm-6">
        <a href="tel:121" class="emergency-card">
          <div class="emergency-card__number">121</div>
          <div class="emergency-card__footer">
            <div class="emergency-card__icon emergency-card__icon--electricity">
              <i class="bi bi-lightning-charge-fill"></i>
            </div>
            <span class="emergency-card__label">استعلامات الكهرباء</span>
          </div>
        </a>
      </div>
    </div>
  </div>
</section>
