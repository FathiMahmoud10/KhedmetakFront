<div class="container my-5">

    <h4 class="my-3" > الخدمات المتاحة </h4>
  <div
    id="servicesCarousel"
    class="carousel slide">

    <div class="carousel-inner " >

      @for (slide of groupedServices; track $index) {

        <div
          class="carousel-item"
          [class.active]="$index === 0">

          <div class="row g-4">

            @for (item of slide; track item.id) {

              <div class="col-md-3">

                <div class="card service-card h-100">

                  <div class="icon-container">
                    <img
                      [src]="item.img"
                      class="service-icon"
                      [alt]="item.title">
                  </div>

                  <div class="card-body d-flex flex-column">

                    <h5 class="card-title">
                      {{ item.title }}
                    </h5>

                    <p class="card-text flex-grow-1">
                      {{ item.description }}
                    </p>

                    <button class="btn service-btn mt-auto">
                      عرض الخدمة
                    </button>

                  </div>

                </div>

              </div>

            }

          </div>

        </div>

      }

    </div>

    @if (groupedServices.length > 1) {

      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#servicesCarousel"
        data-bs-slide="prev">

        <i class="bi bi-chevron-right fs-1 text-primary"> </i>

      </button>

      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#servicesCarousel"
        data-bs-slide="next">

        <i class="bi bi-chevron-left fs-1 text-primary"></i>

      </button>

    }

  </div>

</div>
