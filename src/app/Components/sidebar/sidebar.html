<!-- Overlay -->
<div class="sidebar-overlay" *ngIf="isOpen" (click)="close()"></div>

<!-- Drawer -->
<aside class="admin-drawer" [class.admin-drawer--open]="isOpen">
  <div class="admin-drawer__inner">

    <!-- Header -->
    <div class="admin-drawer__header">
      <div class="admin-drawer__header-text">
        <span class="admin-drawer__badge">
          <i class="fas fa-shield-alt"></i>
          لوحة التحكم
        </span>
        <h2 class="admin-drawer__title">Khedmetak AI</h2>
        <p class="admin-drawer__sub">نظام إدارة الخدمات الحكومية</p>
      </div>
      <button class="admin-drawer__close" (click)="close()" type="button" aria-label="إغلاق القائمة">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <!-- Nav -->
    <nav class="admin-drawer__nav">
      <span class="admin-drawer__nav-label">القائمة الرئيسية</span>
      <ul class="admin-drawer__list">
        <li>
          <a routerLink="/admin-dashboard" routerLinkActive="is-active" class="admin-drawer__link" (click)="close()">
            <span class="admin-drawer__link-icon"><i class="fas fa-chart-pie"></i></span>
            <span class="admin-drawer__link-text">الرئيسية (الإحصائيات)</span>
          </a>
        </li>
        <li>
          <a routerLink="/manage-services" routerLinkActive="is-active" class="admin-drawer__link" (click)="close()">
            <span class="admin-drawer__link-icon"><i class="fas fa-cogs"></i></span>
            <span class="admin-drawer__link-text">إدارة الخدمات</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin-profile" routerLinkActive="is-active" class="admin-drawer__link" (click)="close()">
            <span class="admin-drawer__link-icon"><i class="fas fa-user-shield"></i></span>
            <span class="admin-drawer__link-text">ملف الأدمن</span>
          </a>
        </li>
      </ul>

      <!-- NEW: Service Data Management group (matches AdminCategories / AdminFees / AdminRequiredDocuments / AdminServices / AdminSteps) -->
      <span class="admin-drawer__nav-label">إدارة بيانات الخدمات</span>
      <ul class="admin-drawer__list">
        <li>
          <a routerLink="/admin-categories" routerLinkActive="is-active" class="admin-drawer__link" (click)="close()">
            <span class="admin-drawer__link-icon"><i class="fas fa-tags"></i></span>
            <span class="admin-drawer__link-text">الفئات</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin-fees" routerLinkActive="is-active" class="admin-drawer__link" (click)="close()">
            <span class="admin-drawer__link-icon"><i class="fas fa-coins"></i></span>
            <span class="admin-drawer__link-text">الرسوم</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin-required-documents" routerLinkActive="is-active" class="admin-drawer__link" (click)="close()">
            <span class="admin-drawer__link-icon"><i class="fas fa-file-alt"></i></span>
            <span class="admin-drawer__link-text">المستندات المطلوبة</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin-services" routerLinkActive="is-active" class="admin-drawer__link" (click)="close()">
            <span class="admin-drawer__link-icon"><i class="fas fa-concierge-bell"></i></span>
            <span class="admin-drawer__link-text">الخدمات</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin-steps" routerLinkActive="is-active" class="admin-drawer__link" (click)="close()">
            <span class="admin-drawer__link-icon"><i class="fas fa-list-ol"></i></span>
            <span class="admin-drawer__link-text">خطوات الخدمة</span>
          </a>
        </li>
      </ul>

    </nav>

    <!-- Footer -->
    <div class="admin-drawer__footer">
      <img
        src="assets/images/images.jpg"
        alt="Admin"
        class="admin-drawer__avatar"
        width="44"
        height="44"
        onerror="this.src='https://ui-avatars.com/api/?name=Admin&background=298b64&color=fff'"
      />
      <div class="admin-drawer__user">
        <span class="admin-drawer__user-name">مدير النظام</span>
        <span class="admin-drawer__user-email">admin@khedmetak.gov.eg</span>
      </div>
      <span class="admin-drawer__status"></span>
    </div>

  </div>
</aside>
