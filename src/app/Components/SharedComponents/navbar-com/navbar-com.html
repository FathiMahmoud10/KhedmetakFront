<nav class="app-navbar" [class.app-navbar--admin]="isAdminPage" [class.app-navbar--preview]="isUserPreview">
  <div class="app-navbar__inner container-fluid">

    <!-- اليمين: القائمة والشعار -->
    <div class="app-navbar__start">
      <!-- زر السايد بار يظهر فقط داخل لوحات التحكم الداخلية الحقيقية -->
      <button
        *ngIf="isDashboardPage"
        class="app-navbar__menu-btn"
        (click)="toggleSidebar()"
        type="button"
        aria-label="فتح القائمة"
      >
        <span class="app-navbar__menu-icon">
          <span></span>
          <span></span>
          <span></span>
        </span>
        <span class="app-navbar__menu-label">القائمة</span>
      </button>

      <a class="app-navbar__brand" routerLink="/home">
        <img src="Images/Logo3.png" alt="Khedmetak AI" class="app-navbar__logo" width="52" height="52" />
        <div class="app-navbar__brand-text">
          <span class="app-navbar__brand-name">Khedmetak AI</span>
          <span class="app-navbar__brand-tag" *ngIf="!isAdminPage && !isUserPreview">مساعد ذكي للخدمات الحكومية</span>
          <span class="app-navbar__brand-tag app-navbar__brand-tag--admin" *ngIf="isAdminPage">لوحة تحكم النظام</span>
          <span class="app-navbar__brand-tag app-navbar__brand-tag--preview" *ngIf="isUserPreview">
            <i class="fas fa-eye"></i> وضع معاينة كمستخدم
          </span>
        </div>
      </a>
    </div>

    <!-- المنتصف: روابط التنقل السريعة (تظل ظاهرة في المظهر الخارجي دائماً) -->
    <div class="app-navbar__center" *ngIf="!isDashboardPage">
      <ul class="app-navbar__links">
        <li><a class="app-navbar__link" routerLink="/home" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">الرئيسية</a></li>
        <li><a class="app-navbar__link" routerLink="/chat" routerLinkActive="is-active">المساعد الذكي</a></li>
        <li><a class="app-navbar__link" routerLink="/services" routerLinkActive="is-active">الخدمات</a></li>
      </ul>
    </div>

    <!-- اليسار: أزرار التفاعل والحسابات -->
    <div class="app-navbar__end">

      <!-- 1. أزرار الحسابات والـ Auth (تظهر إذا لم يسجل المستخدم دخوله وكان في المظهر الخارجي) -->
      <ul class="app-navbar__auth" *ngIf="!isLoggedIn && !isDashboardPage">
        <li>
          <a class="app-navbar__auth-link app-navbar__auth-link--primary" routerLink="/login">
            <i class="fas fa-sign-in-alt"></i>
            <span>تسجيل الدخول</span>
          </a>
        </li>
        <li>
          <a class="app-navbar__auth-link" routerLink="/signup">
            <i class="fas fa-user-plus"></i>
            <span>حساب جديد</span>
          </a>
        </li>
      </ul>

      <!-- أزرار تظهر عند تسجيل الدخول (مثل زر خروج) -->
      <ul class="app-navbar__auth" *ngIf="isLoggedIn && !isDashboardPage">
        <li>
          <button class="app-navbar__auth-link" (click)="logout()" style="background: none; border: none; cursor: pointer; color: inherit; font: inherit; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-sign-out-alt"></i>
            <span>تسجيل الخروج</span>
          </button>
        </li>
      </ul>

      <!-- 2. زر تغيير الوضع الداكن (Dark Mode) -->
      <button
        class="app-navbar__icon-btn"
        (click)="toggleDarkMode()"
        type="button"
        [attr.aria-label]="isDarkMode ? 'الوضع النهاري' : 'الوضع الليلي'"
      >
        <i class="fas" [ngClass]="isDarkMode ? 'fa-sun' : 'fa-moon'"></i>
      </button>

      <!-- 3. زر الملف الشخصي: يتغير حسب الدور (أدمن/مستخدم) بدل ما يفضل ثابت على ملف المستخدم دايماً -->
      <a *ngIf="!isDashboardPage && !isUserPreview && isLoggedIn && isAdmin" class="app-navbar__return-btn" routerLink="/admin-dashboard">
        <i class="fas fa-user-shield"></i>
        <span>ملف الأدمن</span>
      </a>
      <a *ngIf="!isDashboardPage && !isUserPreview && isLoggedIn && !isAdmin" class="app-navbar__return-btn" routerLink="/profile">
        <i class="fas fa-user"></i>
        <span>ملف المستخدم</span>
      </a>

      <!-- 4. زر العودة للموقع (يظهر في لوحات التحكم الحقيقية، وصفحات الملف الشخصي، أو في صفحة الشات، أو في صفحة الخدمات) -->
      <button *ngIf="!isUserPreview && (isDashboardPage || isChatPage || isServicesPage || isProfilePage)" class="app-navbar__return-btn" (click)="goBack()" type="button">
        <i class="fas fa-arrow-right"></i>
        <span>العودة للموقع</span>
      </button>

      <!-- 5. أثناء وضع "معاينة كمستخدم" يظهر دائماً زر واحد فقط للرجوع للوحة تحكم الأدمن -->
      <button *ngIf="isUserPreview" class="app-navbar__return-btn app-navbar__return-btn--preview" (click)="exitUserPreview()" type="button">
        <i class="fas fa-arrow-right-from-bracket"></i>
        <span>الرجوع للوحة تحكم الأدمن</span>
      </button>
    </div>

  </div>
</nav>
