<app-sidebar></app-sidebar>
<div style="margin-right: 260px;">
  <!-- ... كود الـ HTML الحالي لصفحة إدارة الخدمات بالكامل يوضع هنا ... -->
</div>
<div class="container-fluid py-4" style="direction: rtl; font-family: 'Cairo', sans-serif;">
  
    <!-- العنوان الرئيسي للقسم -->
    <div class="mb-4">
      <h2 class="fw-bold" style="color: #023264;">إدارة الخدمات الحكومية</h2>
      <p class="text-muted">يمكنك إضافة خدمات جديدة للنظام أو التحكم في الخدمات الحالية وحذفها.</p>
    </div>
  
    <div class="row g-4">
      <!-- 1. استمارة إضافة خدمة جديدة (الجانب الأيمن) -->
      <div class="col-12 col-lg-4">
        <div class="card border-0 shadow-sm p-4 text-end" style="border-radius: 12px; background-color: #ffffff;">
          <h5 class="fw-bold mb-4" style="color: #023264;"><i class="fas fa-plus-circle me-1"></i> إضافة خدمة جديدة</h5>
          
          <form (ngSubmit)="addService()">
            <!-- حقل اسم الخدمة -->
            <div class="mb-3">
              <label class="form-label fw-semibold text-secondary">اسم الخدمة الحكومية</label>
              <input type="text" class="form-control text-center py-2" [(ngModel)]="newService.title" name="title" placeholder="مثال: استخراج جواز سفر" required>
            </div>
  
            <!-- حقل فئة الخدمة -->
            <div class="mb-3">
              <label class="form-label fw-semibold text-secondary">الفئة / القطاع</label>
              <select class="form-select text-center py-2" [(ngModel)]="newService.category" name="category">
                <option value="المرور">المرور</option>
                <option value="الأحوال المدنية">الأحوال المدنية</option>
                <option value="الشهر العقاري">الشهر العقاري</option>
                <option value="الجوازات">الجوازات والهجرة</option>
              </select>
            </div>
  
            <!-- حقل وصف الخدمة -->
            <div class="mb-4">
              <label class="form-label fw-semibold text-secondary">وصف تفصيلي للخدمة</label>
              <textarea class="form-control text-end py-2" [(ngModel)]="newService.description" name="description" rows="4" placeholder="اكتب هنا شروط وأوراق الخدمة..." required></textarea>
            </div>
  
            <!-- زر الإرسال باللون الأخضر التابع لهوية مشروعكِ -->
            <button type="submit" class="btn w-100 py-2 fw-bold text-white" style="background-color: #298b64; border-radius: 8px;">
              <i class="fas fa-save me-1"></i> حفظ وإضافة الخدمة
            </button>
          </form>
        </div>
      </div>
  
      <!-- 2. كروت الخدمات الحالية المتاحة بالنظام (الجانب الأيسر) -->
      <div class="col-12 col-lg-8">
        <div class="card border-0 shadow-sm p-4" style="border-radius: 12px; background-color: #ffffff;">
          <h5 class="fw-bold mb-4 text-end" style="color: #023264;"><i class="fas fa-list-ul me-1"></i> الخدمات المتاحة حالياً بالنظام ({{ servicesList.length }})</h5>
          
          <!-- في حال كانت القائمة فارغة -->
          <div *ngIf="servicesList.length === 0" class="text-center py-5 text-muted">
            <i class="fas fa-folder-open fa-3x mb-3" style="color: #ced4da;"></i>
            <p class="mb-0">لا توجد خدمات مضافة حالياً. استخدم النموذج لإضافة خدمة جديدة.</p>
          </div>
  
          <!-- شبكة عرض كروت الخدمات المعالجة بالـ ngFor -->
          <div class="row g-3" *ngIf="servicesList.length > 0">
            <div class="col-12 col-md-6" *ngFor="let svc of servicesList">
              <div class="service-management-card p-3 border rounded-3 text-end h-100 d-flex flex-column justify-content-between">
                <div>
                  <div class="d-flex align-items-center justify-content-between mb-2">
                    <!-- شارة الفئة تلوّن تلقائياً حسب لون الهوية -->
                    <span class="badge px-3 py-1 rounded-pill" style="background-color: rgba(2, 50, 100, 0.1); color: #023264;">{{ svc.category }}</span>
                    <div class="rounded-circle p-2 bg-light text-primary">
                      <i class="fas" [ngClass]="svc.icon || 'fa-concierge-bell'"></i>
                    </div>
                  </div>
                  <h6 class="fw-bold mb-1" style="color: #023264;">{{ svc.title }}</h6>
                  <p class="text-muted small mb-3 text-truncate-2">{{ svc.description }}</p>
                </div>
                
                <!-- زر الحذف المخصص للـ الأدمن في أسفل الكارت -->
                <div class="border-top pt-2 mt-2 text-start">
                  <button class="btn btn-sm btn-outline-danger px-3" style="border-radius: 6px;" (click)="deleteService(svc.id)">
                    <i class="fas fa-trash-alt me-1"></i> حذف الخدمة
                  </button>
                </div>
              </div>
            </div>
          </div>
  
        </div>
      </div>
    </div>
  
  </div>
